<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subdivision Ladder Metronome</title>
    <style>
        :root {
            --bg: #ffffff;
            --text-dark: #111111;
            --text-light: #aaaaaa;
            --row-height: 80px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            position: relative;
        }

        /* --- SUBTLE BACK BUTTON --- */
        .back-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            font-size: 0.9rem;
            color: var(--text-light);
            text-decoration: none;
            transition: color 0.15s ease;
            font-weight: 400;
        }

        .back-btn:hover {
            color: var(--text-dark);
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            margin-top: 40px;
        }

        /* --- METRONOME PANEL --- */
        .metro-core {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .bpm-value {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: -1px;
            margin: 0;
        }

        .slider-wrapper {
            width: 100%;
        }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: #e0e0e0;
            height: 2px;
            outline: none;
            border: none;
            padding: 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--text-dark);
            cursor: pointer;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
            width: 100%;
            justify-content: center;
        }

        select {
            font-family: inherit;
            background: none;
            border: 1px solid #e0e0e0;
            color: var(--text-dark);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }

        button {
            font-family: inherit;
            background: var(--text-dark);
            border: 1px solid var(--text-dark);
            color: var(--bg);
            padding: 6px 24px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        button:hover {
            background: #333;
        }

        button.playing {
            background: #ff3b30;
            border-color: #ff3b30;
        }

        #resetBtn {
            background: none;
            color: var(--text-dark);
            border: 1px solid #e0e0e0;
        }

        #resetBtn:hover {
            background: #f5f5f5;
        }

        /* --- SCROLLING VIEWPORT --- */
        .viewport {
            position: relative;
            height: calc(var(--row-height) * 3);
            overflow: hidden;
            margin-top: 30px;
            width: 100%;
            border-top: 1px solid #eaeaea;
            border-bottom: 1px solid #eaeaea;
        }

        .viewport::before, .viewport::after {
            content: "";
            position: absolute;
            left: 0;
            width: 100%;
            height: 1px;
            background: #eaeaea;
            z-index: 2;
        }
        .viewport::before { top: var(--row-height); }
        .viewport::after { top: calc(var(--row-height) * 2); }

        .scroller-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transform: translateY(0px);
        }

        .pattern-row {
            height: var(--row-height);
            line-height: var(--row-height);
            font-size: 2.8rem;
            font-weight: 300;
            text-align: center;
            white-space: nowrap;
        }

        .pattern-row.muted {
            color: var(--text-light);
            font-size: 1.8rem;
        }

        .pattern-row.counting {
            color: #34c759;
            font-weight: 400;
        }

        .tracker {
            margin-top: 20px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-light);
            text-align: center;
        }
    </style>
</head>
<body>

<a href="index.html" class="back-btn">&larr; back</a>

<div class="container">
    <div class="metro-core">
        <div class="bpm-value" id="bpmDisplay">50</div>
        
        <div class="slider-wrapper">
            <input type="range" id="bpmSlider" min="40" max="100" value="50">
        </div>

        <div class="controls-row">
            <select id="loopsSelect">
                <option value="1" selected>1 Bar (4 Clicks)</option>
                <option value="2">2 Bars (8 Clicks)</option>
                <option value="4">4 Bars (16 Clicks)</option>
                <option value="8">8 Bars (32 Clicks)</option>
            </select>
            <button id="startBtn">START</button>
            <button id="resetBtn">RESET</button>
        </div>
    </div>

    <div class="viewport">
        <div class="scroller-strip" id="strip">
            <div class="pattern-row muted" id="row-prev">-</div>
            <div class="pattern-row" id="row-curr">-</div>
            <div class="pattern-row muted" id="row-next">-</div>
            <div class="pattern-row muted" id="row-future">-</div>
        </div>
    </div>

    <div class="tracker" id="tracker">-</div>
</div>

<script>
    const ladder = [1, 2, 3, 4, 5, 6, 7, 8, 9, 8, 7, 6, 5, 4, 3, 2, 1];
    
    let currentIndex = 0;
    let isPlaying = false;
    let audioCtx = null;
    let nextNoteTime = 0.0;
    let timerId = null;

    let bpm = 50;
    let clicksPerSubdivision = 4; // Defaulting to 1 Bar (4 Clicks)
    let currentClickInSubdivision = 0;
    
    const ROW_HEIGHT = 80;

    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const bpmSlider = document.getElementById('bpmSlider');
    const bpmDisplay = document.getElementById('bpmDisplay');
    const loopsSelect = document.getElementById('loopsSelect');
    const strip = document.getElementById('strip');
    
    const rPrev = document.getElementById('row-prev');
    const rCurr = document.getElementById('row-curr');
    const rNext = document.getElementById('row-next');
    const rFuture = document.getElementById('row-future');
    const trackerDisplay = document.getElementById('tracker');

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function getLadderValue(index) {
        if (index < 0 || index >= ladder.length) return "";
        return ladder[index];
    }

    function updateDisplayStatic(idx, clickCount) {
        rCurr.classList.remove('counting');
        rPrev.textContent = idx === 0 ? "" : getLadderValue(idx - 1);
        rCurr.textContent = getLadderValue(idx);
        rNext.textContent = getLadderValue((idx + 1) % ladder.length);
        rFuture.textContent = getLadderValue((idx + 2) % ladder.length);
        
        trackerDisplay.textContent = `STEP ${idx + 1}/${ladder.length} • CLICK ${clickCount + 1}/${clicksPerSubdivision}`;
    }

    function updateDisplayCountIn(countNum) {
        rPrev.textContent = "";
        rCurr.textContent = "READY";
        rNext.textContent = getLadderValue(0);
        rFuture.textContent = getLadderValue(1);
        rCurr.classList.add('counting');
        trackerDisplay.textContent = `COUNT-IN • ${countNum} / 4`;
    }

    function playClick(time, frequency, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.frequency.setValueAtTime(frequency, time);
        gain.gain.setValueAtTime(0.25, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
        
        osc.start(time);
        osc.stop(time + duration + 0.01);
    }

    function runCountIn(startTime) {
        const beatDuration = 60.0 / bpm;
        
        for (let i = 0; i < 4; i++) {
            const clickTime = startTime + (i * beatDuration);
            playClick(clickTime, 1000, 0.05);
            
            setTimeout(() => {
                if (!isPlaying) return;
                updateDisplayCountIn(i + 1);
            }, (clickTime - audioCtx.currentTime) * 1000);
        }

        return startTime + (4 * beatDuration);
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            scheduleMainBeat(currentClickInSubdivision, currentIndex, nextNoteTime);
            advanceBeat();
        }
        timerId = setTimeout(scheduler, 25.0);
    }

    function scheduleMainBeat(clickCount, stepIndex, time) {
        const currentSubdivision = ladder[stepIndex];
        const beatDuration = 60.0 / bpm;
        const subDuration = beatDuration / currentSubdivision;

        for (let i = 0; i < currentSubdivision; i++) {
            const subTime = time + (i * subDuration);
            if (i === 0) {
                playClick(subTime, 550, 0.04); 
            } else {
                playClick(subTime, 800, 0.012); 
            }
        }

        setTimeout(() => {
            if (!isPlaying) return;
            
            if (clickCount === 0) {
                strip.style.transition = "none";
                strip.style.transform = `translateY(0px)`;
            }

            updateDisplayStatic(stepIndex, clickCount);

            if (clickCount === clicksPerSubdivision - 1) {
                strip.style.transition = `transform ${beatDuration}s cubic-bezier(0.25, 1, 0.5, 1)`;
                strip.style.transform = `translateY(-${ROW_HEIGHT}px)`;
            }
        }, (time - audioCtx.currentTime) * 1000);
    }

    function advanceBeat() {
        currentClickInSubdivision++;
        
        if (currentClickInSubdivision >= clicksPerSubdivision) {
            currentClickInSubdivision = 0;
            currentIndex = (currentIndex + 1) % ladder.length;
        }

        nextNoteTime += (60.0 / bpm);
    }

    function start() {
        initAudio();
        if (isPlaying) return;
        isPlaying = true;

        startBtn.textContent = 'STOP';
        startBtn.classList.add('playing');

        bpm = parseInt(bpmSlider.value);
        clicksPerSubdivision = parseInt(loopsSelect.value) * 4;

        const runTime = audioCtx.currentTime + 0.05;
        const mainLoopStartTime = runCountIn(runTime);
        
        nextNoteTime = mainLoopStartTime;
        
        setTimeout(() => {
            if (!isPlaying) return;
            scheduler();
        }, (mainLoopStartTime - audioCtx.currentTime) * 1000 - 15);
    }

    function stop() {
        isPlaying = false;
        startBtn.textContent = 'START';
        startBtn.classList.remove('playing');
        clearTimeout(timerId);
    }

    function resetAll() {
        stop();
        currentIndex = 0;
        currentClickInSubdivision = 0;
        strip.style.transition = "none";
        strip.style.transform = `translateY(0px)`;
        updateDisplayStatic(0, 0);
    }

    startBtn.addEventListener('click', () => {
        if (isPlaying) stop(); else start();
    });

    resetBtn.addEventListener('click', resetAll);

    bpmSlider.addEventListener('input', (e) => {
        bpm = parseInt(e.target.value);
        bpmDisplay.textContent = bpm;
        
        if (isPlaying && audioCtx) {
            nextNoteTime = Math.max(audioCtx.currentTime, nextNoteTime);
        }
    });

    loopsSelect.addEventListener('change', (e) => {
        clicksPerSubdivision = parseInt(e.target.value) * 4;
        if (!isPlaying) {
            resetAll();
        }
    });

    // Initialize layout setup pass
    updateDisplayStatic(0, 0);
</script>
</body>
</html>
