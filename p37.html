<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P37 - Minimalist Metronome</title>
    <style>
        :root {
            --bg: #ffffff;
            --text-dark: #111111;
            --text-light: #aaaaaa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            position: relative;
        }

        /* --- SUBTLE BACK BUTTON --- */
        .back-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            font-size: 0.9rem;
            color: var(--text-light);
            text-decoration: none;
            transition: color 0.15s ease;
            font-weight: 400;
        }

        .back-btn:hover {
            color: var(--text-dark);
        }

        .container {
            width: 100%;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* --- METRONOME PANEL --- */
        .metro-core {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .bpm-value {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: -1px;
            margin: 0;
        }

        .slider-wrapper {
            width: 100%;
        }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: #e0e0e0;
            height: 2px;
            outline: none;
            border: none;
            padding: 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--text-dark);
            cursor: pointer;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 5px;
        }

        button {
            font-family: inherit;
            background: var(--text-dark);
            border: 1px solid var(--text-dark);
            color: var(--bg);
            padding: 6px 32px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        button:hover {
            background: #333;
        }

        button.playing {
            background: #ff3b30;
            border-color: #ff3b30;
        }

        /* --- SCREEN-FIT IMAGE VIEWPORT --- */
        .image-viewport {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }

        .image-viewport img {
            max-width: 100%;
            max-height: calc(100vh - 220px); 
            height: auto;
            object-fit: contain;
            border: 1px solid #eaeaea;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<a href="index.html" class="back-btn">&larr; back</a>

<div class="container">
    <div class="metro-core">
        <div class="bpm-value" id="bpmDisplay">100</div>
        
        <div class="slider-wrapper">
            <input type="range" id="bpmSlider" min="40" max="250" value="100">
        </div>

        <div class="controls-row">
            <button id="startBtn">START</button>
        </div>
    </div>

    <div class="image-viewport">
        <img src="p37.png" alt="Exercise Pattern P37">
    </div>
</div>

<script>
    let isPlaying = false;
    let audioCtx = null;
    let nextNoteTime = 0.0;
    let timerId = null;

    let bpm = 100;

    const startBtn = document.getElementById('startBtn');
    const bpmSlider = document.getElementById('bpmSlider');
    const bpmDisplay = document.getElementById('bpmDisplay');

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playClick(time) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.frequency.setValueAtTime(500, time);
        gain.gain.setValueAtTime(0.25, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
        
        osc.start(time);
        osc.stop(time + 0.05);
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            playClick(nextNoteTime);
            nextNoteTime += (60.0 / bpm);
        }
        timerId = setTimeout(scheduler, 25.0);
    }

    function start() {
        initAudio();
        if (isPlaying) return;
        isPlaying = true;

        startBtn.textContent = 'STOP';
        startBtn.classList.add('playing');

        bpm = parseInt(bpmSlider.value);

        nextNoteTime = audioCtx.currentTime + 0.05;
        scheduler();
    }

    function stop() {
        isPlaying = false;
        startBtn.textContent = 'START';
        startBtn.classList.remove('playing');
        clearTimeout(timerId);
    }

    startBtn.addEventListener('click', () => {
        if (isPlaying) stop(); else start();
    });

    bpmSlider.addEventListener('input', (e) => {
        bpm = parseInt(e.target.value);
        bpmDisplay.textContent = bpm;
        
        // Dynamic Adjustment Fix: If we shift the range slider while playing, 
        // updating nextNoteTime immediately handles the tempo change on the next scheduled beat.
        if (isPlaying && audioCtx) {
            nextNoteTime = Math.max(audioCtx.currentTime, nextNoteTime);
        }
    });
</script>
</body>
</html>
